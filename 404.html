<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Redirecting&hellip;</title>
  </head>
  <body>
    <script>
      // GitHub Pages preview only: this repo's links are extension-less
      // (/about, /news/<slug>) for the real host's .htaccess MultiViews rule.
      // GH Pages can't run that rule, so it 404s here instead -- this
      // rewrites the path to its .html file and redirects.
      var path = location.pathname;
      if (path.endsWith("/")) {
        path += "index.html";
      } else if (!/\.[a-zA-Z0-9]+$/.test(path)) {
        path += ".html";
      }
      location.replace(path + location.search + location.hash);
    </script>
  </body>
</html>
